<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 26, 46, 0.85) 0%, rgba(22, 33, 62, 0.85) 100%),
                        url('ah-venom-beast.jpg');
            background-size: cover, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 1.5rem;
        }

        .player-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"], input[type="number"] {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 1rem;
            flex: 1;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #00d4ff, #9b59b6);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .player-tag {
            background: rgba(0, 212, 255, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-tag .remove {
            cursor: pointer;
            color: #ff6b6b;
            font-weight: bold;
        }

        .match {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            gap: 15px;
        }

        .match-player {
            flex: 1;
            min-width: 150px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .match-player .name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .match-player input {
            width: 80px;
            text-align: center;
            margin: 0 auto;
        }

        .match-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .vs {
            font-size: 1.5rem;
            color: #9b59b6;
            font-weight: bold;
        }

        .win-btn {
            padding: 8px 16px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            border-radius: 20px;
            margin-top: 10px;
        }

        .win-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            transform: none;
            box-shadow: none;
        }

        .win-btn.selected {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            color: #fff;
        }

        .tie-btn {
            padding: 8px 16px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
            border-radius: 20px;
        }

        .tie-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
            transform: none;
            box-shadow: none;
        }

        .tie-btn.selected {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .vp-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .standings-table th, .standings-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .standings-table th {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
        }

        .standings-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .round-indicator {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .round-dot {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s;
        }

        .round-dot.active {
            background: linear-gradient(90deg, #00d4ff, #9b59b6);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .round-dot.completed {
            background: #27ae60;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0;
        }

        .podium-place {
            text-align: center;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            min-width: 150px;
        }

        .podium-place.first {
            background: linear-gradient(180deg, #ffd700, #ffb800);
            height: 200px;
            color: #1a1a2e;
        }

        .podium-place.second {
            background: linear-gradient(180deg, #c0c0c0, #a8a8a8);
            height: 150px;
            color: #1a1a2e;
        }

        .podium-place.third {
            background: linear-gradient(180deg, #cd7f32, #b8722d);
            height: 120px;
            color: #1a1a2e;
        }

        .podium-place .rank {
            font-size: 2rem;
            font-weight: bold;
        }

        .podium-place .player-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .podium-place .points {
            font-size: 1rem;
        }

        .hidden {
            display: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
        }

        .match-completed {
            opacity: 0.6;
            border: 2px solid #27ae60;
        }

        .warning {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .info-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tournament Manager</h1>

        <div class="round-indicator">
            <div class="round-dot" id="round1-dot">1</div>
            <div class="round-dot" id="round2-dot">2</div>
            <div class="round-dot" id="round3-dot">3</div>
        </div>

        <div class="section" id="registration-section">
            <h2>Register Players</h2>
            <div class="player-input">
                <input type="text" id="player-name" placeholder="Enter player name" onkeypress="if(event.key==='Enter')addPlayer()">
                <button onclick="addPlayer()">Add Player</button>
            </div>
            <div class="player-list" id="player-list"></div>
            <p class="info-text">Add at least 4 players to start the tournament (even number required)</p>
            <div class="action-buttons">
                <button onclick="startTournament()" id="start-btn" disabled>Start Tournament</button>
            </div>
        </div>

        <div class="section hidden" id="matches-section">
            <h2>Round <span id="current-round">1</span> Matches</h2>
            <div id="matches-container"></div>
            <div class="action-buttons">
                <button onclick="submitRoundResults()" id="submit-round-btn">Submit Round Results</button>
            </div>
        </div>

        <div class="section" id="standings-section">
            <h2>Current Standings</h2>
            <table class="standings-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Matches Won</th>
                        <th>Victory Points</th>
                    </tr>
                </thead>
                <tbody id="standings-body">
                    <tr><td colspan="4" style="text-align: center; opacity: 0.5;">No players registered yet</td></tr>
                </tbody>
            </table>
        </div>

        <div class="section hidden" id="final-section">
            <h2>Tournament Complete!</h2>
            <div class="podium">
                <div class="podium-place second">
                    <div class="rank">2nd</div>
                    <div class="player-name" id="second-place">-</div>
                    <div class="points" id="second-points">0 pts</div>
                </div>
                <div class="podium-place first">
                    <div class="rank">1st</div>
                    <div class="player-name" id="first-place">-</div>
                    <div class="points" id="first-points">0 pts</div>
                </div>
                <div class="podium-place third">
                    <div class="rank">3rd</div>
                    <div class="player-name" id="third-place">-</div>
                    <div class="points" id="third-points">0 pts</div>
                </div>
            </div>
            <div class="action-buttons">
                <button onclick="resetTournament()">New Tournament</button>
            </div>
        </div>
    </div>

    <script>
        let players = [];
        let currentRound = 0;
        let matches = [];
        let matchHistory = {};
        let tournamentFinished = false;
        const TOTAL_ROUNDS = 3;
        const STORAGE_KEY = 'tournamentState';

        // Save state to localStorage
        function saveState() {
            const state = {
                players,
                currentRound,
                matches,
                matchHistory,
                tournamentFinished
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    players = state.players || [];
                    currentRound = state.currentRound || 0;
                    matches = state.matches || [];
                    matchHistory = state.matchHistory || {};
                    tournamentFinished = state.tournamentFinished || false;
                    restoreUI();
                } catch (e) {
                    console.error('Failed to load saved state:', e);
                }
            }
        }

        // Restore UI based on loaded state
        function restoreUI() {
            updateStandings();
            
            if (tournamentFinished) {
                // Tournament is complete, show final results
                document.getElementById('registration-section').classList.add('hidden');
                document.getElementById('matches-section').classList.add('hidden');
                document.getElementById('final-section').classList.remove('hidden');
                
                for (let i = 1; i <= TOTAL_ROUNDS; i++) {
                    document.getElementById('round' + i + '-dot').classList.remove('active');
                    document.getElementById('round' + i + '-dot').classList.add('completed');
                }
                
                const sorted = [...players].sort((a, b) => {
                    if (b.matchesWon !== a.matchesWon) return b.matchesWon - a.matchesWon;
                    return b.victoryPoints - a.victoryPoints;
                });
                if (sorted[0]) {
                    document.getElementById('first-place').textContent = sorted[0].name;
                    document.getElementById('first-points').textContent = sorted[0].matchesWon + ' wins, ' + sorted[0].victoryPoints + ' VP';
                }
                if (sorted[1]) {
                    document.getElementById('second-place').textContent = sorted[1].name;
                    document.getElementById('second-points').textContent = sorted[1].matchesWon + ' wins, ' + sorted[1].victoryPoints + ' VP';
                }
                if (sorted[2]) {
                    document.getElementById('third-place').textContent = sorted[2].name;
                    document.getElementById('third-points').textContent = sorted[2].matchesWon + ' wins, ' + sorted[2].victoryPoints + ' VP';
                }
            } else if (currentRound > 0) {
                // Tournament in progress
                document.getElementById('registration-section').classList.add('hidden');
                document.getElementById('matches-section').classList.remove('hidden');
                updateRoundIndicator();
                renderMatches();
            } else {
                // Registration phase
                updatePlayerList();
                checkStartButton();
            }
        }

        function addPlayer() {
            const input = document.getElementById('player-name');
            const name = input.value.trim();
            
            if (name && !players.find(p => p.name.toLowerCase() === name.toLowerCase())) {
                players.push({
                    name: name,
                    matchesWon: 0,
                    victoryPoints: 0
                });
                matchHistory[name] = [];
                input.value = '';
                updatePlayerList();
                updateStandings();
                checkStartButton();
                saveState();
            }
            input.focus();
        }

        function removePlayer(name) {
            players = players.filter(p => p.name !== name);
            delete matchHistory[name];
            updatePlayerList();
            updateStandings();
            checkStartButton();
            saveState();
        }

        function updatePlayerList() {
            const container = document.getElementById('player-list');
            container.innerHTML = players.map(p => 
                '<div class="player-tag">' + p.name + 
                '<span class="remove" onclick="removePlayer(\'' + p.name + '\')">&times;</span></div>'
            ).join('');
        }

        function checkStartButton() {
            const btn = document.getElementById('start-btn');
            btn.disabled = players.length < 4 || players.length % 2 !== 0;
        }

        function updateStandings() {
            const tbody = document.getElementById('standings-body');
            
            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; opacity: 0.5;">No players registered yet</td></tr>';
                return;
            }

            const sorted = [...players].sort((a, b) => {
                if (b.matchesWon !== a.matchesWon) return b.matchesWon - a.matchesWon;
                return b.victoryPoints - a.victoryPoints;
            });
            
            tbody.innerHTML = sorted.map((p, i) => 
                '<tr><td>' + (i + 1) + '</td><td>' + p.name + '</td><td>' + p.matchesWon + '</td><td>' + p.victoryPoints + '</td></tr>'
            ).join('');
        }

        function startTournament() {
            currentRound = 1;
            document.getElementById('registration-section').classList.add('hidden');
            document.getElementById('matches-section').classList.remove('hidden');
            updateRoundIndicator();
            generateMatches();
            saveState();
        }

        function updateRoundIndicator() {
            for (let i = 1; i <= TOTAL_ROUNDS; i++) {
                const dot = document.getElementById('round' + i + '-dot');
                dot.classList.remove('active', 'completed');
                if (i < currentRound) {
                    dot.classList.add('completed');
                } else if (i === currentRound) {
                    dot.classList.add('active');
                }
            }
        }

        function generateMatches() {
            const sorted = [...players].sort((a, b) => {
                if (b.matchesWon !== a.matchesWon) return b.matchesWon - a.matchesWon;
                return b.victoryPoints - a.victoryPoints;
            });
            matches = [];
            const paired = new Set();

            for (let i = 0; i < sorted.length; i++) {
                if (paired.has(sorted[i].name)) continue;

                for (let j = i + 1; j < sorted.length; j++) {
                    if (paired.has(sorted[j].name)) continue;
                    
                    if (!matchHistory[sorted[i].name].includes(sorted[j].name)) {
                        matches.push({
                            player1: sorted[i].name,
                            player2: sorted[j].name,
                            vp1: 0,
                            vp2: 0,
                            winner: null,
                            completed: false
                        });
                        paired.add(sorted[i].name);
                        paired.add(sorted[j].name);
                        break;
                    }
                }
            }

            const unpaired = sorted.filter(p => !paired.has(p.name));
            for (let i = 0; i < unpaired.length; i += 2) {
                if (i + 1 < unpaired.length) {
                    matches.push({
                        player1: unpaired[i].name,
                        player2: unpaired[i + 1].name,
                        vp1: 0,
                        vp2: 0,
                        winner: null,
                        completed: false
                    });
                }
            }

            renderMatches();
            saveState();
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            document.getElementById('current-round').textContent = currentRound;

            container.innerHTML = matches.map((match, index) => 
                '<div class="match" id="match-' + index + '">' +
                '<div class="match-player">' +
                    '<div class="name">' + match.player1 + '</div>' +
                    '<div class="vp-label">Victory Points</div>' +
                    '<input type="number" id="vp1-' + index + '" value="' + match.vp1 + '" min="0" onchange="updateMatchVP(' + index + ')" placeholder="VP">' +
                    '<button onclick="setWinner(' + index + ', 1)" class="win-btn ' + (match.winner === 1 ? 'selected' : '') + '">Winner</button>' +
                '</div>' +
                '<div class="match-center">' +
                    '<div class="vs">VS</div>' +
                    '<button onclick="setWinner(' + index + ', 0)" class="tie-btn ' + (match.winner === 0 ? 'selected' : '') + '">Tie</button>' +
                '</div>' +
                '<div class="match-player">' +
                    '<div class="name">' + match.player2 + '</div>' +
                    '<div class="vp-label">Victory Points</div>' +
                    '<input type="number" id="vp2-' + index + '" value="' + match.vp2 + '" min="0" onchange="updateMatchVP(' + index + ')" placeholder="VP">' +
                    '<button onclick="setWinner(' + index + ', 2)" class="win-btn ' + (match.winner === 2 ? 'selected' : '') + '">Winner</button>' +
                '</div>' +
                '</div>'
            ).join('');
        }

        function updateMatchVP(index) {
            const vp1 = parseInt(document.getElementById('vp1-' + index).value) || 0;
            const vp2 = parseInt(document.getElementById('vp2-' + index).value) || 0;
            matches[index].vp1 = vp1;
            matches[index].vp2 = vp2;
            saveState();
        }

        function setWinner(index, winner) {
            matches[index].winner = winner;
            renderMatches();
            saveState();
        }

        function submitRoundResults() {
            let allValid = true;
            matches.forEach((match, index) => {
                if (match.winner === null) {
                    allValid = false;
                }
            });

            if (!allValid) {
                alert('Please select a winner (or tie) for all matches');
                return;
            }

            matches.forEach((match, index) => {
                const vp1 = parseInt(document.getElementById('vp1-' + index).value) || 0;
                const vp2 = parseInt(document.getElementById('vp2-' + index).value) || 0;

                const player1 = players.find(p => p.name === match.player1);
                const player2 = players.find(p => p.name === match.player2);

                player1.victoryPoints += vp1;
                player2.victoryPoints += vp2;

                if (match.winner === 1) {
                    player1.matchesWon++;
                } else if (match.winner === 2) {
                    player2.matchesWon++;
                }
                // Tie (winner === 0) means no one gets a match win

                matchHistory[match.player1].push(match.player2);
                matchHistory[match.player2].push(match.player1);
            });

            updateStandings();

            if (currentRound < TOTAL_ROUNDS) {
                currentRound++;
                updateRoundIndicator();
                generateMatches();
            } else {
                finishTournament();
            }
            saveState();
        }

        function finishTournament() {
            tournamentFinished = true;
            document.getElementById('matches-section').classList.add('hidden');
            document.getElementById('final-section').classList.remove('hidden');

            for (let i = 1; i <= TOTAL_ROUNDS; i++) {
                document.getElementById('round' + i + '-dot').classList.remove('active');
                document.getElementById('round' + i + '-dot').classList.add('completed');
            }

            const sorted = [...players].sort((a, b) => {
                if (b.matchesWon !== a.matchesWon) return b.matchesWon - a.matchesWon;
                return b.victoryPoints - a.victoryPoints;
            });

            if (sorted[0]) {
                document.getElementById('first-place').textContent = sorted[0].name;
                document.getElementById('first-points').textContent = sorted[0].matchesWon + ' wins, ' + sorted[0].victoryPoints + ' VP';
            }
            if (sorted[1]) {
                document.getElementById('second-place').textContent = sorted[1].name;
                document.getElementById('second-points').textContent = sorted[1].matchesWon + ' wins, ' + sorted[1].victoryPoints + ' VP';
            }
            if (sorted[2]) {
                document.getElementById('third-place').textContent = sorted[2].name;
                document.getElementById('third-points').textContent = sorted[2].matchesWon + ' wins, ' + sorted[2].victoryPoints + ' VP';
            }
        }

        function resetTournament() {
            players = [];
            currentRound = 0;
            matches = [];
            matchHistory = {};
            tournamentFinished = false;

            document.getElementById('registration-section').classList.remove('hidden');
            document.getElementById('matches-section').classList.add('hidden');
            document.getElementById('final-section').classList.add('hidden');

            for (let i = 1; i <= TOTAL_ROUNDS; i++) {
                document.getElementById('round' + i + '-dot').classList.remove('active', 'completed');
            }

            updatePlayerList();
            updateStandings();
            checkStartButton();
            localStorage.removeItem(STORAGE_KEY);
        }

        // Load saved state on page load
        document.addEventListener('DOMContentLoaded', loadState);
    </script>
</body>
</html>
